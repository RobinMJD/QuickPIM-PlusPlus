name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Check version sync
        run: node scripts/check-version-sync.mjs

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=low

      - name: Package Web Store ZIP
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release
          (cd dist && zip -qr "../release/quickpim-plusplus-v${VERSION}-chrome-webstore.zip" . -x "*.DS_Store")

      - name: Upload Web Store ZIP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: chrome-webstore-zip
          path: release/quickpim-plusplus-v*-chrome-webstore.zip
          if-no-files-found: error
